name: Build & Push lambda-playwright to ECR

on:
  push:
    paths:
      - 'src/main/resources/lambda-playwright/**'
    branches:
      - server

  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-2
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: lambda/playwright
      IMAGE_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          REPO_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}
          docker build \
            -t ${ECR_REPOSITORY}:${IMAGE_TAG} \
            src/main/resources/lambda-playwright
          docker tag ${ECR_REPOSITORY}:${IMAGE_TAG} ${REPO_URI}:${IMAGE_TAG}

      - name: Push Docker image
        run: |
          REPO_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}
          docker push ${REPO_URI}:${IMAGE_TAG}
