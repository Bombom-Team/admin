name: Admin Server Deploy

on:
  push:
    branches:
      - server
    paths-ignore:
      - 'src/main/resources/lambda-playwright/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: application.yml 생성
        shell: bash
        env:
          APPLICATION_PROD_PROPERTIES: ${{ secrets.APPLICATION_ADMIN_PROPERTIES }}
          APPLICATION_TEST_PROPERTIES: ${{ secrets.APPLICATION_ADMIN_TEST_PROPERTIES }}
        run: |
          mkdir -p src/main/resources src/test/resources
          # Admin은 보통 Prod 프로필을 사용하므로 해당 시크릿을 주입
          printf '%s' "${APPLICATION_PROD_PROPERTIES:-}" > src/main/resources/application.yml
          printf '%s' "${APPLICATION_TEST_PROPERTIES:-}" > src/test/resources/application.yml

      - name: 빌드 (테스트 포함)
        shell: bash
        env:
          SPRING_PROFILES_ACTIVE: test
          # 테스트 시 필요한 경우 추가
        run: |
          ./gradlew clean build --no-daemon

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        run: |
          if ! docker buildx inspect ci-builder &>/dev/null; then
            docker buildx create --use --name ci-builder
          else
            docker buildx use ci-builder
          fi
          
          # 캐시 효율을 위해 bombom-admin:buildcache 태그 활용
          docker buildx build \
            --platform linux/arm64,linux/amd64 \
            --cache-from=type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:admin-buildcache \
            --cache-to=type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:admin-buildcache,mode=max \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:admin \
            --push .

  deploy:
    needs: build
    runs-on: [ self-hosted, admin ]

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 이미지 Pull
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:admin
          docker pull "$IMAGE"

      - name: 이미지 변경 여부 확인
        id: compare_digest
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:admin
          NEW=$(docker inspect --format='{{.Id}}' "$IMAGE")
          
          # 실행 중인 컨테이너 이름: bombom-admin (docker-compose-admin.yml 기준)
          if docker inspect bombom-admin &>/dev/null; then
            CURRENT=$(docker inspect --format='{{.Image}}' bombom-admin)
          else
            CURRENT="not_found"
          fi
          
          echo "new_image_id=$NEW" >> $GITHUB_OUTPUT
          echo "current_image_id=$CURRENT" >> $GITHUB_OUTPUT
          
          if [ "$NEW" = "$CURRENT" ]; then
            echo "Image unchanged. Skipping deployment."
            echo "skip_deploy=true" >> $GITHUB_ENV
          else
            echo "skip_deploy=false" >> $GITHUB_ENV
          fi

      - name: .env 파일 생성
        if: env.skip_deploy == 'false'
        run: |
          # docker-compose-admin.yml에서 사용하는 환경변수 매핑
          echo "RDS_ENDPOINT=${{ secrets.PROD_RDS_ENDPOINT }}" >> .env
          echo "DATABASE=${{ secrets.PROD_DATABASE }}" >> .env
          echo "MYSQL_USER=${{ secrets.PROD_MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.PROD_MYSQL_PASSWORD }}" >> .env

      - name: 컨테이너 재배포
        if: env.skip_deploy == 'false'
        shell: bash
        run: |
          set -euo pipefail
          
          # 안전하게 내리고 올리기
          docker compose --env-file .env -f docker-compose-admin.yml down || true
          
          docker compose --env-file .env -f docker-compose-admin.yml up -d
          
      - name: Docker 리소스 정리
        if: env.skip_deploy == 'false'
        run: |
          echo "Docker 리소스 정리 시작"
          docker container prune -f --filter "until=24h"
          docker image prune -f --filter "until=24h"
          echo "리소스 정리 완료"
