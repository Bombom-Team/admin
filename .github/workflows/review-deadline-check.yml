name: Review Deadline Check

# 리뷰 기한을 초과한 배정을 찾아 Discord로 알립니다.
# 배정/완료 처리는 woowacourse-teams/2025-bom-bom의 워크플로우가 담당하고,
# 이 워크플로우는 Supabase와 Discord만 사용합니다 (GitHub API 접근 없음).
# 주의: schedule은 default 브랜치(main)의 워크플로우만 실행됩니다.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find overdue assignments
        id: check
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const { run } = require('./.github/scripts/check-overdue.js');
            await run({ core });

      - name: Send Discord notification
        if: steps.check.outputs.has_overdue == 'true'
        uses: ./.github/actions/discord-notify
        with:
          webhook: ${{ secrets.DISCORD_REVIEW_WEBHOOK_URL }}
          content: '⏰ *리뷰 기한이 초과된 PR이 있습니다!*'
          mentions: ${{ steps.check.outputs.mentions }}
          title: '기한 초과 리뷰 목록'
          url: https://github.com/woowacourse-teams/2025-bom-bom/pulls
          color: 15158332
          fields: ${{ steps.check.outputs.fields }}

      - name: Mark as notified
        if: steps.check.outputs.has_overdue == 'true'
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const { markNotified } = require('./.github/scripts/check-overdue.js');
            await markNotified({ core }, '${{ steps.check.outputs.ids }}');
