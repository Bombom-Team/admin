name: Reviewer Rotation

# woowacourse-teams/2025-bom-bom의 열린 PR을 폴링해서
# 리뷰 완료 동기화 → 신규 배정 → 기한 초과 알림을 순서대로 수행합니다.
# 주의: schedule은 default 브랜치(main)의 워크플로우만 실행됩니다.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  TARGET_REPO: woowacourse-teams/2025-bom-bom
  TARGET_BASE_BRANCHES: server-dev,email-server-dev

jobs:
  rotate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync completed reviews
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          github-token: ${{ secrets.BOMBOM_REPO_TOKEN }}
          script: |
            const { run } = require('./.github/scripts/sync-completed.js');
            await run({ github, core });

      - name: Assign reviewers
        id: assign
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          github-token: ${{ secrets.BOMBOM_REPO_TOKEN }}
          script: |
            const { run } = require('./.github/scripts/assign-reviewer.js');
            await run({ github, core });

      - name: Send Discord notification (assigned)
        if: steps.assign.outputs.assigned == 'true'
        uses: ./.github/actions/discord-notify
        with:
          webhook: ${{ secrets.DISCORD_REVIEW_WEBHOOK_URL }}
          content: '👀 *리뷰어가 배정되었습니다! (기한: 24시간)*'
          mentions: ${{ steps.assign.outputs.mentions }}
          title: '새 리뷰 배정'
          url: https://github.com/woowacourse-teams/2025-bom-bom/pulls
          color: 3447003
          fields: ${{ steps.assign.outputs.fields }}

      - name: Find overdue assignments
        id: check
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const { run } = require('./.github/scripts/check-overdue.js');
            await run({ core });

      - name: Send Discord notification (overdue)
        if: steps.check.outputs.has_overdue == 'true'
        uses: ./.github/actions/discord-notify
        with:
          webhook: ${{ secrets.DISCORD_REVIEW_WEBHOOK_URL }}
          content: '⏰ *리뷰 기한이 초과된 PR이 있습니다!*'
          mentions: ${{ steps.check.outputs.mentions }}
          title: '기한 초과 리뷰 목록'
          url: https://github.com/woowacourse-teams/2025-bom-bom/pulls
          color: 15158332
          fields: ${{ steps.check.outputs.fields }}

      - name: Mark as notified
        if: steps.check.outputs.has_overdue == 'true'
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const { markNotified } = require('./.github/scripts/check-overdue.js');
            await markNotified({ core }, '${{ steps.check.outputs.ids }}');
