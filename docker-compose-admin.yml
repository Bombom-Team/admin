version: "3.8"
services:
  bombom-admin-server:
    image: bombomnewsletter/bom-bom:admin
    container_name: bombom-admin
    ports:
      - 8082:8080
      - 8081:8081
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_ENDPOINT}:3306/${DATABASE}?useSSL=false&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      LOGGING_FILE_NAME: /logs/bombom-prod.log
      JAVA_TOOL_OPTIONS: "-Xms384m -Xmx384m -XX:MaxMetaspaceSize=128m"


      #### --------------------------------------
      #### OpenTelemetry (전체 주석 처리)
#      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
#      OTEL_SERVICE_NAME: bombom-server-prod
#      OTEL_EXPORTER_OTLP_ENDPOINT: ${PROD_OTEL_ENDPOINT}
#      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
#      OTEL_TRACES_EXPORTER: otlp
#      OTEL_TRACES_SAMPLER: always_on
#      OTEL_METRICS_EXPORTER: none
#      OTEL_LOGS_EXPORTER: none
#      OTEL_PROPAGATORS: tracecontext,baggage
#      OTEL_INSTRUMENTATION_HTTP_SERVER_EXCLUDE_URLS: /actuator/.*
#      OTEL_JAVAAGENT_DEBUG: "true"

    volumes:
      - /home/ec2-user/bombom-prod/logs:/logs
#      - /home/ec2-user/bombom-prod/opentelemetry/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar

    # 컨테이너 graceful shutdown 대기 시간
    stop_grace_period: 40s

    deploy:
      restart_policy:
        condition: on-failure
        # 5s 간격으로 재시작 시도 5번. 실패하면 그냥 꺼짐
        max_attempts: 5
        delay: 5s
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
